
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="deposit_page_title">D2AUD - Deposit</title>
  <link rel="stylesheet" href="assets/css/style.css?v=1.0.20" />
  <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
</head>
<body class="deposit-page">
  <header class="top-header">
    <div data-layout-section="home-header"></div>
    <div class="logo-box"><img class="site-logo" src="assets/custom/images/logo.png"/></div>
    <button class="lang-btn" id="langBtn" type="button" aria-label="Change language">
      <img src="assets/images/translate-language.png" alt="Change language">
    </button>
  </header>

  <main class="deposit-main">
    <section class="deposit-card">
      <div class="deposit-head">
        <div>
          <span class="mini-label" data-i18n="wallet_top_up">WALLET TOP UP</span>
          <h1 data-i18n="deposit_title">Deposit</h1>
        </div>
        <div class="deposit-balance">
          <span data-i18n="balance">Balance</span>
          <strong>AUD 0.00</strong>
        </div>
      </div>

      <label class="deposit-field">
        <span data-i18n="deposit_amount">Deposit Amount</span>
        <input type="number" placeholder="Please enter deposit amount (e.g. 100)" data-i18n-placeholder="deposit_amount_placeholder">
      </label>

      <div class="quick-amounts">
        <button type="button">10</button>
        <button type="button">30</button>
        <button type="button">50</button>
        <button type="button">100</button>
        <button type="button">300</button>
        <button type="button">500</button>
      </div>

      <div class="payment-title" data-i18n="select_payment_method">Select Payment Method</div>
      <div class="payment-grid">
        <button type="button" class="pay-method active"><span>🏦</span><b data-i18n="online_banking">Online Banking</b><em data-i18n="fast_deposit">Fast deposit</em></button>
        <button type="button" class="pay-method"><span>💳</span><b data-i18n="card">Card</b><em data-i18n="visa_mastercard">Visa / Mastercard</em></button>
        <button type="button" class="pay-method"><span>📱</span><b data-i18n="e_wallet">E-Wallet</b><em data-i18n="instant_transfer">Instant transfer</em></button>
      </div>

      <div class="deposit-note">
        <b data-i18n="minimum_deposit_aud_10">Minimum Deposit: AUD 10.00</b>
        <p data-i18n="deposit_note_desc">Please check the amount before submitting. Deposit status will be updated after confirmation.</p>
      </div>

      <div class="deposit-actions">
        <a href="index.html" class="cancel-btn" data-i18n="cancel">Cancel</a>
        <button type="button" class="submit-btn" data-i18n="submit_deposit">Submit Deposit</button>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <a href="index.html"><img src="assets/custom/images/home.png" alt="HOME" data-i18n-alt="home"></a>
    <a href="history.html"><img src="assets/custom/images/history.png" alt="HISTORY" data-i18n-alt="history"></a>
    <a href="bonus.html"><img src="assets/custom/images/bonus.png" alt="BONUS" data-i18n-alt="bonus"></a>
    <a href="chat.html"><img src="assets/custom/images/livechat.png" alt="LIVE CHAT" data-i18n-alt="live_chat"></a>
    <a href="setting.html"><img src="assets/custom/images/setting.png" alt="SETTING" data-i18n-alt="setting"></a>
  </nav>

  <div class="lang-overlay" id="langOverlay" aria-hidden="true">
    <div class="lang-modal" role="dialog" aria-modal="true" aria-label="Language selection" data-i18n-aria-label="language_selection">
      <button class="lang-option active" type="button" data-lang="en" data-i18n="lang_english">English</button>
      <button class="lang-option" type="button" data-lang="zh" data-i18n="lang_chinese">中文</button>
    </div>
  </div>

  <script src="assets/js/lang.js?v=1.0.0"></script>
  <script src="assets/js/deposit.js?v=1.0.0"></script>
  <script src="assets/js/config.js?v=1.0.10"></script>
  <script src="assets/js/custom-asset-cache.js?v=1.0.10"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
  <script src="assets/js/firebase-config.js?v=1.0.0"></script>
  <script src="assets/js/livechat-widget.js?v=1.0.0"></script>
</body>
</html>
