<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D2AUD Responsive</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="top-header">
    <div class="logo-box"><div class="logo-icon">D</div><div>D2AUD</div></div>
    <button class="lang-btn" id="langBtn" type="button" aria-label="Change language">G文</button>
  </header>

  <section class="main-layout">
    <section class="mobile-top-area">
      <div class="side-slider mobile-slider">
        <img class="slide active" src="assets/images/banner-weekly.png" alt="Weekly Ranking Bonus" />
        <img class="slide" src="assets/images/banner-daily.png" alt="Daily Mission" />
        <div class="dots"><span class="active"></span><span></span></div>
      </div>
    </section>

    <aside class="left-sidebar">
      <div class="side-slider" id="sideSlider">
        <img class="slide active" src="assets/images/banner-weekly.png" alt="Weekly Ranking Bonus" />
        <img class="slide" src="assets/images/banner-daily.png" alt="Daily Mission" />
        <div class="dots"><span class="active"></span><span></span></div>
      </div>

      <img class="promo-img" src="assets/images/banner-referrer.png" alt="Referrer Bonus" />

      <div class="action-row image-actions">
        <img src="assets/images/share.png" alt="Share">
        <img src="assets/images/downline.png" alt="Downline">
      </div>
      <img class="copy-image" src="assets/images/copy.png" alt="Copy Link">

      <a class="social-image" href="#"><img src="assets/images/facebook.png" alt="Facebook"></a>
      <a class="social-image" href="#"><img src="assets/images/telegram.png" alt="Telegram"></a>
    </aside>

    <main class="center-content">
      <div class="category-slider">
        <button class="cat-arrow cat-prev" type="button" aria-label="Previous category">‹</button>
        <div class="category-row">
          <img src="assets/images/nav1.png" class="cat-icon">
        </div>
        <button class="cat-arrow cat-next" type="button" aria-label="Next category">›</button>
      </div>

      <div class="sub-tab-row" id="subTabRow">
        <button class="active" data-tab="slots">SLOTS</button>
        <button data-tab="mini">MINI GAME</button>
      </div>

      <div class="game-grid"></div>
    </main>

    <section class="mobile-bottom-area">
      <img class="promo-img" src="assets/images/banner-referrer.png" alt="Referrer Bonus" />

      <div class="action-row image-actions">
        <img src="assets/images/share.png" alt="Share">
        <img src="assets/images/downline.png" alt="Downline">
      </div>
      <img class="copy-image" src="assets/images/copy.png" alt="Copy Link">

      <a class="social-image" href="#"><img src="assets/images/facebook.png" alt="Facebook"></a>
      <a class="social-image" href="#"><img src="assets/images/telegram.png" alt="Telegram"></a>
    </section>

    <aside class="right-panel">
      <div class="login-row">
        <img src="assets/images/login.gif" alt="LOGIN" class="auth-gif">
        <img src="assets/images/register.gif" alt="REGISTER" class="auth-gif">
      </div>
      <div class="balance-box">
        <div class="balance-text">
          <p>Balance:</p>
          <h3>AUD 0.00</h3>
          <p>Minimum Deposit: <b>AUD 10.00</b></p>
          <p>Minimum Withdrawal: <b>AUD 50.00</b></p>
        </div>
        <div class="money-btns">
          <button type="button" aria-label="Deposit"><img src="assets/images/right1.png" alt="DEPOSIT"></button>
          <button type="button" aria-label="Withdraw"><img src="assets/images/right2.png" alt="WITHDRAW"></button>
          <button type="button" aria-label="Refresh"><img src="assets/images/right3.png" alt="REFRESH"></button>
        </div>
      </div>
    </aside>
  </section>

  <nav class="bottom-nav">
    <a class="active" href="#"><img src="assets/images/bottom1.png" alt="HOME"></a>
    <a href="#"><img src="assets/images/bottom2.png" alt="HISTORY"></a>
    <a href="#"><img src="assets/images/bottom3.png" alt="BONUS"></a>
    <a href="#"><img src="assets/images/bottom4.png" alt="LIVE CHAT"></a>
    <a href="#"><img src="assets/images/bottom5.png" alt="SETTING"></a>
  </nav>


  <div class="lang-overlay" id="langOverlay" aria-hidden="true">
    <div class="lang-modal" role="dialog" aria-modal="true" aria-label="Language selection">
      <button class="lang-option active" type="button" data-lang="en">English <span>✔</span></button>
      <button class="lang-option" type="button" data-lang="zh">中文</button>
    </div>
  </div>
  <script src="assets/js/app.js"></script>
</body>
</html>
