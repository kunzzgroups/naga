<!DOCTYPE html>
<html lang="en">
<head>
  <script>document.documentElement.classList.add('page-loading');</script>
  <style id="page-loader-critical">html{background:#070707}html.page-loading,html.page-loading body{overflow:hidden!important}html.page-loading body{opacity:0}html.page-loading:before{content:"";position:fixed;inset:0;z-index:2147483646;background:#070707}html.page-loading:after{content:"";position:fixed;top:50%;left:50%;z-index:2147483647;width:34px;height:34px;margin:-17px 0 0 -17px;border:3px solid rgba(255,255,255,.18);border-top-color:#35f486;border-radius:50%;opacity:0;animation:pageLoaderSpin .65s linear .24s infinite}@keyframes pageLoaderSpin{0%{opacity:0;transform:rotate(0)}1%{opacity:1}100%{opacity:1;transform:rotate(360deg)}}</style>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="chat_page_title">TitanXGaming - Live Chat</title>
  <link rel="stylesheet" href="assets/css/style.css?v=1.0.50" />
  <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
  <link rel="preconnect" href="https://bo.titanxgaming.com" crossorigin>
  <link rel="preconnect" href="https://static.titanxgaming.com" crossorigin>
  <link rel="dns-prefetch" href="//bo.titanxgaming.com">
  <link rel="dns-prefetch" href="//static.titanxgaming.com">
</head>
<body class="chat-page">
  <header class="top-header">
    <div data-layout-section="home-header"></div>
    <div class="logo-box"><img class="site-logo" src="assets/custom/images/logo.png"/ decoding="async" loading="eager" fetchpriority="high"></div>
  </header>

  <main class="chat-main">
    <section class="chat-shell" aria-label="Live chat" data-i18n-aria-label="chat_section_label">
      <div class="chat-top-card">
        <div class="chat-title-box">
          <span class="chat-flame">🔥</span>
          <div>
            <h1 data-i18n="live_chat">LIVE CHAT</h1>
            <p data-i18n="chat_support_center">TitanXGaming support center</p>
          </div>
        </div>
        <div class="chat-status-pill"><i></i> <span data-i18n="online">Online</span></div>
      </div>

      <div class="chat-messages" id="chatMessages">
        
      </div>

      <form class="chat-compose" id="chatForm">
        <div class="chat-input-wrap" id="chatInputWrap">
          <div class="chat-paste-preview" id="chatPastePreview" aria-live="polite"></div>
          <textarea id="chatInput" placeholder="Text here..." data-i18n-placeholder="chat_text_placeholder" autocomplete="off" enterkeyhint="send" rows="1"></textarea>
        </div>
        <button type="button" class="chat-attach" id="chatAttach" aria-label="Attach" data-i18n-aria-label="attach"><i class="fa-solid fa-link"></i></button>
        <input class="chat-file-input" type="file" id="chatFileInput" multiple accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt,.zip" />
        <button type="submit" class="chat-send" aria-label="Send" data-i18n-aria-label="send"><i class="fa-solid fa-paper-plane"></i></button>
      </form>
    </section>
  </main>

  <nav class="bottom-nav">
    <a href="index.html"><img src="assets/custom/images/home.png" alt="HOME" data-i18n-alt="home" decoding="async" loading="lazy"></a>
    <a href="index.html"><img src="assets/custom/images/history.png" alt="HISTORY" data-i18n-alt="history" decoding="async" loading="lazy"></a>
    <a href="bonus.html"><img src="assets/custom/images/bonus.png" alt="BONUS" data-i18n-alt="bonus" decoding="async" loading="lazy"></a>
    <a class="active" href="chat.html"><img src="assets/custom/images/livechat.png" alt="LIVE CHAT" data-i18n-alt="live_chat" decoding="async" loading="lazy"></a>
    <a href="setting.html"><img src="assets/custom/images/setting.png" alt="SETTING" data-i18n-alt="setting" decoding="async" loading="lazy"></a>
  </nav>

  <div class="lang-overlay" id="langOverlay" aria-hidden="true">
    <div class="lang-modal" role="dialog" aria-modal="true" aria-label="Language selection" data-i18n-aria-label="language_selection">
      <button class="lang-option active" type="button" data-lang="en"><span data-i18n="lang_english">English</span> <span class="checkmark">✔</span></button>
      <button class="lang-option" type="button" data-lang="zh"><span data-i18n="lang_chinese">中文</span></button>
    </div>
  </div>

  <script src="assets/js/site-shell.js?v=1.0.11"></script>
  <script src="assets/js/lang.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
  <script src="assets/js/firebase-config.js?v=1.0.0"></script>
  <script src="assets/js/chat.js?v=1.1.4"></script>
  <script src="assets/js/config.js?v=1.0.15"></script>
  <script src="assets/js/layout-section-loader.js?v=1.1.3"></script>
  <script src="assets/js/custom-asset-cache.js?v=1.0.13"></script>
  <script src="assets/js/page-loader.js?v=1.0.6"></script>
</body>
</html>
