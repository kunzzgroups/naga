<!DOCTYPE html>
<html lang="en">
<head>
  <script>document.documentElement.classList.add('page-loading');</script>
  <style id="page-loader-critical">html.page-loading,html.page-loading body{overflow:hidden!important}html.page-loading:before{content:"";position:fixed;inset:0;z-index:2147483646;background:#050505}html.page-loading:after{content:"";position:fixed;top:50%;left:50%;z-index:2147483647;width:38px;height:38px;margin:-19px 0 0 -19px;border:3px solid rgba(255,255,255,.22);border-top-color:#fff;border-radius:50%;animation:pageLoaderSpin .65s linear infinite}@keyframes pageLoaderSpin{to{transform:rotate(360deg)}} </style>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title data-i18n="page_title">TitanXGaming</title>
  <link rel="stylesheet" href="assets/css/style.css?v=1.0.32" />
  <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
</head>
<body class="login-page">
  <header class="top-header">
    <div data-layout-section="home-header"></div>
    <div class="logo-box"><img class="site-logo" src="assets/custom/images/logo.png"/ decoding="async" loading="eager" fetchpriority="high"></div>
    <button class="lang-btn" id="langBtn" type="button" aria-label="Change language">
      <img src="assets/images/translate-language.png" alt="Change language" decoding="async" loading="lazy">
    </button>
  </header>

  <main class="login-main">
    <section class="login-card" data-i18n-aria-label="login_panel">
      <div class="login-tabs">
        <button class="login-tab active" type="button" data-login-tab="login" data-i18n="login">LOGIN</button>
        <button class="login-tab" type="button" data-login-tab="register" data-i18n="register">REGISTER</button>
      </div>

      <form class="login-form login-form-panel" id="loginForm">
        <label class="field-wrap">
          <span class="field-icon"><i class="fa-solid fa-user"></i></span>
          <input type="text" placeholder="Username" data-i18n-placeholder="username" autocomplete="username" />
        </label>

        <label class="field-wrap">
          <span class="field-icon"><i class="fa-solid fa-lock"></i></span>
          <input type="password" placeholder="Password" data-i18n-placeholder="password" autocomplete="current-password" />
        </label>

        <a href="#" class="forgot-link" data-i18n="forgot_password">Forgot Password?</a>

        <button class="submit-login" type="button" data-i18n="login">LOGIN</button>
      </form>

      <form class="login-form login-form-panel active" id="registerForm">
        <label class="field-wrap">
          <span class="field-icon"><i class="fa-solid fa-user"></i></span>
          <input type="text" placeholder="Full Name" data-i18n-placeholder="full_name" autocomplete="name" />
        </label>

        <label class="field-wrap">
          <span class="field-icon"><i class="fa-solid fa-mobile"></i></span>
          <input type="phone" placeholder="Mobile No." data-i18n-placeholder="mobile_no" autocomplete="tel" />
        </label>

        <label class="field-wrap">
          <span class="field-icon"><i class="fa-solid fa-lock"></i></span>
          <input type="password" placeholder="Password (6-20 characters)" data-i18n-placeholder="password_6_20" autocomplete="new-password" />
        </label>

        <label class="field-wrap">
          <span class="field-icon"><i class="fa-regular fa-user"></i></span>
          <input type="text" placeholder="Referrer Code (optional)" data-i18n-placeholder="referrer_code_optional" autocomplete="off" />
        </label>

        
        <div class="verify-row">
          <input type="text" placeholder="Verification Code" data-i18n-placeholder="verification_code" />
          <button type="button" class="verify-btn" data-i18n="get_code">GET CODE</button>
        </div>

        <button class="submit-login" type="button" data-i18n="register">REGISTER</button>
      </form>
    </section>
  </main>

  <nav class="bottom-nav">
    <a class="active" href="index.html"><img src="assets/custom/images/home.png" alt="HOME" data-i18n-alt="home" decoding="async" loading="lazy"></a>
    <a href="#"><img src="assets/custom/images/history.png" alt="HISTORY" data-i18n-alt="history" decoding="async" loading="lazy"></a>
    <a href="#"><img src="assets/custom/images/bonus.png" alt="BONUS" data-i18n-alt="bonus" decoding="async" loading="lazy"></a>
    <a href="chat.html"><img src="assets/custom/images/livechat.png" alt="LIVE CHAT" data-i18n-alt="live_chat" decoding="async" loading="lazy"></a>
    <a href="#"><img src="assets/custom/images/setting.png" alt="SETTING" data-i18n-alt="setting" decoding="async" loading="lazy"></a>
  </nav>

  <div class="lang-overlay" id="langOverlay" aria-hidden="true">
    <div class="lang-modal" role="dialog" aria-modal="true" data-i18n-aria-label="language_selection">
      <button class="lang-option active" type="button" data-lang="en"><span data-i18n="lang_english">English</span> <span class="checkmark">✔</span></button>
      <button class="lang-option" type="button" data-lang="zh"><span data-i18n="lang_chinese">中文</span></button>
    </div>
  </div>

  <script src="assets/js/config.js?v=1.0.14"></script>
  <script src="assets/js/site-shell.js?v=1.0.3"></script>
  <script src="assets/js/lang.js?v=1.0.8"></script>
  <script src="assets/js/login.js?v=1.0.6"></script>
  <script src="assets/js/custom-asset-cache.js?v=1.0.101"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
  <script src="assets/js/firebase-config.js?v=1.0.0"></script>
  <script src="assets/js/livechat-widget.js?v=1.0.1"></script>
  <script src="assets/js/page-loader.js?v=1.0.3"></script>
</body>
</html>
