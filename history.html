<!DOCTYPE html>
<html lang="en">
<head>
  <script>document.documentElement.classList.add('page-loading');</script>
  <style id="page-loader-critical">html{background:#070707}html.page-loading,html.page-loading body{overflow:hidden!important}html.page-loading body{opacity:0}html.page-loading:before{content:"";position:fixed;inset:0;z-index:2147483646;background:#070707}html.page-loading:after{content:"";position:fixed;top:50%;left:50%;z-index:2147483647;width:34px;height:34px;margin:-17px 0 0 -17px;border:3px solid rgba(255,255,255,.18);border-top-color:#35f486;border-radius:50%;opacity:0;animation:pageLoaderSpin .65s linear .24s infinite}@keyframes pageLoaderSpin{0%{opacity:0;transform:rotate(0)}1%{opacity:1}100%{opacity:1;transform:rotate(360deg)}}</style>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="history_page_title">TitanXGaming - History</title>
  <link rel="stylesheet" href="assets/css/style.css?v=1.0.69" />
  <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
  <link rel="preconnect" href="https://bo.titanxgaming.com" crossorigin>
  <link rel="preconnect" href="https://static.titanxgaming.com" crossorigin>
  <link rel="dns-prefetch" href="//bo.titanxgaming.com">
  <link rel="dns-prefetch" href="//static.titanxgaming.com">
</head>
<body class="history-page">
  <header class="top-header">
    <div data-layout-section="home-header"></div>
    <div class="logo-box"><img class="site-logo" src="assets/custom/images/logo.png"/ decoding="async" loading="eager" fetchpriority="high"></div>
  </header>

  <main class="history-main">
    <section class="history-panel">
      <div class="history-tabs" role="tablist" aria-label="History tabs" data-i18n-aria-label="history_tabs">
        <button class="history-tab active" type="button" data-tab="transactions" data-i18n="transactions">Transactions</button>
        <button class="history-tab" type="button" data-tab="bet" data-i18n="bet_history">Bet History</button>
      </div>

      <div class="history-content active" id="transactionsPanel">
        <div class="history-title-row">
          <h2 data-i18n="transactions">Transactions</h2>
          <span data-i18n="latest_records">Latest Records</span>
        </div>

        <div class="history-table-wrap">
          <table class="history-table transaction-table">
            <thead>
              <tr>
                <th data-i18n="transactions">Transactions</th>
                <th data-i18n="status">Status</th>
              </tr>
            </thead>
            <tbody id="transactionsBody"></tbody>
          </table>
          <div class="history-lazy-status" id="transactionsLazyStatus" data-i18n="loading_more_records">Loading more records...</div>
        </div>
      </div>

      <div class="history-content" id="betPanel">
        <div class="history-title-row">
          <h2 data-i18n="bet_history">Bet History</h2>
          <span data-i18n="only_show_last_100_records">Only Show Last 100 Records</span>
        </div>

        <div class="history-table-wrap">
          <table class="history-table bet-table">
            <thead>
              <tr>
                <th data-i18n="date_time">Date &amp; Time</th>
                <th data-i18n="game">Game</th>
                <th data-i18n="bet_amount">Bet Amount</th>
                <th data-i18n="win_loss">Win / Loss</th>
              </tr>
            </thead>
            <tbody id="betBody"></tbody>
          </table>
          <div class="history-lazy-status" id="betLazyStatus" data-i18n="loading_more_records">Loading more records...</div>
        </div>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <a href="index.html"><img src="assets/custom/images/home.png" alt="HOME" data-i18n-alt="home" data-i18n-img="img.bottom_home" decoding="async" loading="lazy"></a>
    <a href="index.html"><img src="assets/custom/images/history.png" alt="HISTORY" data-i18n-alt="history" data-i18n-img="img.bottom_history" decoding="async" loading="lazy"></a>
    <a href="bonus.html"><img src="assets/custom/images/bonus.png" alt="BONUS" data-i18n-alt="bonus" data-i18n-img="img.bottom_bonus" decoding="async" loading="lazy"></a>
    <a href="chat.html"><img src="assets/custom/images/livechat.png" alt="LIVE CHAT" data-i18n-alt="live_chat" data-i18n-img="img.bottom_chat" decoding="async" loading="lazy"></a>
    <a href="setting.html"><img src="assets/custom/images/setting.png" alt="SETTING" data-i18n-alt="setting" data-i18n-img="img.bottom_setting" decoding="async" loading="lazy"></a>
  </nav>

  <div class="lang-overlay" id="langOverlay" aria-hidden="true">
    <div class="lang-modal" role="dialog" aria-modal="true" aria-label="Language selection" data-i18n-aria-label="language_selection">
      <button class="lang-option active" type="button" data-lang="en"><span data-i18n="lang_english">English</span> <span class="checkmark">✔</span></button>
      <button class="lang-option" type="button" data-lang="zh"><span data-i18n="lang_chinese">中文</span></button>
    </div>
  </div>

  <script src="assets/js/config.js?v=1.0.16"></script>
  <script src="assets/js/layout-section-loader.js?v=1.1.8"></script>
  <script src="assets/js/site-shell.js?v=1.0.12"></script>
  <script src="assets/js/lang.js?v=1.0.8"></script>
  <script src="assets/js/history.js?v=1.0.2-referral"></script>
  <script src="assets/js/custom-asset-cache.js?v=1.0.16"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
  <script src="assets/js/firebase-config.js?v=1.0.0"></script>
  <script src="assets/js/livechat-widget.js?v=1.0.2"></script>
  <script src="assets/js/page-loader.js?v=1.0.6"></script>
</body>
</html>
