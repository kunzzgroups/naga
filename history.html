<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="history_page_title">D2AUD - History</title>
  <link rel="stylesheet" href="assets/css/style.css?v=1.0.17" />
  <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
</head>
<body class="history-page">
  <header class="top-header">
    <div class="logo-box"><img class="site-logo" src="assets/custom/images/logo.png"/></div>
    <i class="fa-solid fa-earth-americas lang-btn" id="langBtn"></i>
  </header>

  <main class="history-main">
    <section class="history-panel">
      <div class="history-tabs" role="tablist" aria-label="History tabs" data-i18n-aria-label="history_tabs">
        <button class="history-tab active" type="button" data-tab="transactions" data-i18n="transactions">Transactions</button>
        <button class="history-tab" type="button" data-tab="bet" data-i18n="bet_history">Bet History</button>
      </div>

      <div class="history-content active" id="transactionsPanel">
        <div class="history-title-row">
          <h2 data-i18n="transactions">Transactions</h2>
          <span data-i18n="latest_records">Latest Records</span>
        </div>

        <div class="history-table-wrap">
          <table class="history-table transaction-table">
            <thead>
              <tr>
                <th data-i18n="transactions">Transactions</th>
                <th data-i18n="status">Status</th>
              </tr>
            </thead>
            <tbody id="transactionsBody"></tbody>
          </table>
          <div class="history-lazy-status" id="transactionsLazyStatus" data-i18n="loading_more_records">Loading more records...</div>
        </div>
      </div>

      <div class="history-content" id="betPanel">
        <div class="history-title-row">
          <h2 data-i18n="bet_history">Bet History</h2>
          <span data-i18n="only_show_last_100_records">Only Show Last 100 Records</span>
        </div>

        <div class="history-table-wrap">
          <table class="history-table bet-table">
            <thead>
              <tr>
                <th data-i18n="date_time">Date &amp; Time</th>
                <th data-i18n="game">Game</th>
                <th data-i18n="bet_amount">Bet Amount</th>
                <th data-i18n="win_loss">Win / Loss</th>
              </tr>
            </thead>
            <tbody id="betBody"></tbody>
          </table>
          <div class="history-lazy-status" id="betLazyStatus" data-i18n="loading_more_records">Loading more records...</div>
        </div>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <a class="active" href="index.html"><img src="assets/custom/images/home.png" alt="HOME" data-i18n-alt="home" data-i18n-img="img.bottom_home"></a>
    <a href="#"><img src="assets/custom/images/history.png" alt="HISTORY" data-i18n-alt="history" data-i18n-img="img.bottom_history"></a>
    <a href="bonus.html"><img src="assets/custom/images/bonus.png" alt="BONUS" data-i18n-alt="bonus" data-i18n-img="img.bottom_bonus"></a>
    <a href="chat.html"><img src="assets/custom/images/livechat.png" alt="LIVE CHAT" data-i18n-alt="live_chat" data-i18n-img="img.bottom_chat"></a>
    <a href="setting.html"><img src="assets/custom/images/setting.png" alt="SETTING" data-i18n-alt="setting" data-i18n-img="img.bottom_setting"></a>
  </nav>

  <div class="lang-overlay" id="langOverlay" aria-hidden="true">
    <div class="lang-modal" role="dialog" aria-modal="true" aria-label="Language selection" data-i18n-aria-label="language_selection">
      <button class="lang-option active" type="button" data-lang="en"><span data-i18n="lang_english">English</span> <span class="checkmark">✔</span></button>
      <button class="lang-option" type="button" data-lang="zh"><span data-i18n="lang_chinese">中文</span></button>
    </div>
  </div>

  <script src="assets/js/lang.js?v=1.0.1"></script>
  <script src="assets/js/history.js?v=1.0.2"></script>
  <script src="assets/js/custom-asset-cache.js?v=1.0.7"></script>
</body>
</html>
