<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="setting_page_title">D2AUD - Setting</title>
  <link rel="stylesheet" href="assets/css/style.css?v=1.0.23" />
  <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
</head>
<body class="setting-page">
  <header class="top-header">
    <div data-layout-section="home-header"></div>
    <div class="logo-box"><img class="site-logo" src="assets/custom/images/logo.png"/></div>
    <button class="lang-btn" id="langBtn" type="button" aria-label="Change language">
      <img src="assets/images/translate-language.png" alt="Change language">
    </button>
  </header>

  <main class="setting-main">
    <section class="setting-shell">
      <article class="profile-card game-glass-card">
        <div class="card-heading">
          <div>
            <h1 data-i18n="profile">Profile</h1>
            <p data-i18n="account_information">Account information</p>
          </div>
          <span class="profile-badge" data-i18n="vip">VIP</span>
        </div>

        <div class="profile-list" id="memberProfileList">
          <div class="profile-row"><span data-i18n="loading">Loading</span><strong>...</strong></div>
        </div>
      </article>

      <article class="setting-card game-glass-card">
        <button class="setting-toggle" id="settingToggle" type="button" aria-expanded="false">
          <span data-i18n="setting_title">Setting</span>
          <i>▲</i>
        </button>

        <div class="setting-menu" id="settingMenu">
          <a href="mobile-setting.html" class="setting-item"><span class="setting-ico"><i class="fa-solid fa-mobile"></i></span><span data-i18n="mobile_number">Mobile Number</span><em>›</em></a>
          <a href="password-setting.html" class="setting-item"><span class="setting-ico"><i class="fa-solid fa-lock"></i></span><span data-i18n="password">Password</span><em>›</em></a>
          <a href="transaction-password-setting.html" class="setting-item"><span class="setting-ico"><i class="fa-solid fa-key"></i></span><span>Transaction Password</span><em>›</em></a>
          <button class="setting-item" id="settingLangBtn" type="button"><span class="setting-ico"><i class="fa-solid fa-language"></i></span><span data-i18n="language">Language</span><em>›</em></button>
          <!-- <a href="#" class="setting-item"><span class="setting-ico"><i class="fa-solid fa-bug"></i></span><span data-i18n="report_a_problem">Report A Problem</span><em>›</em></a> -->
          <a href="login.html" class="setting-item logout"><span class="setting-ico"><i class="fa-solid fa-gear"></i></span><span data-i18n="logout">Logout</span><em>›</em></a>
        </div>
      </article>
    </section>
  </main>

  <nav class="bottom-nav">
    <a class="active" href="index.html"><img src="assets/custom/images/home.png" alt="HOME" data-i18n-img="img.bottom_home" data-i18n-alt="home"></a>
    <a href="history.html"><img src="assets/custom/images/history.png" alt="HISTORY" data-i18n-img="img.bottom_history" data-i18n-alt="history"></a>
    <a href="bonus.html"><img src="assets/custom/images/bonus.png" alt="BONUS" data-i18n-img="img.bottom_bonus" data-i18n-alt="bonus"></a>
    <a href="chat.html"><img src="assets/custom/images/livechat.png" alt="LIVE CHAT" data-i18n-img="img.bottom_chat" data-i18n-alt="live_chat"></a>
    <a href="#"><img src="assets/custom/images/setting.png" alt="SETTING" data-i18n-img="img.bottom_setting" data-i18n-alt="setting"></a>
  </nav>

  <div class="lang-overlay" id="langOverlay" aria-hidden="true">
    <div class="lang-modal" role="dialog" aria-modal="true" aria-label="Language selection" data-i18n-aria-label="language_selection">
      <button class="lang-option active" type="button" data-lang="en"><span data-i18n="lang_english">English</span> <span class="checkmark">✔</span></button>
      <button class="lang-option" type="button" data-lang="zh"><span data-i18n="lang_chinese">中文</span></button>
    </div>
  </div>

  <script src="assets/js/config.js?v=1.0.14"></script>
  <script src="assets/js/lang.js"></script>
  <script src="assets/js/setting.js?v=1.0.3"></script>
  <script src="assets/js/custom-asset-cache.js?v=1.0.11"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
  <script src="assets/js/firebase-config.js?v=1.0.0"></script>
  <script src="assets/js/livechat-widget.js?v=1.0.0"></script>
</body>
</html>
