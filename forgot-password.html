<!DOCTYPE html>
<html lang="en">
<head>
  <script>document.documentElement.classList.add('page-loading');</script>
  <style id="page-loader-critical">html.page-loading,html.page-loading body{overflow:hidden!important}html.page-loading:before{content:"";position:fixed;inset:0;z-index:2147483646;background:#050505}html.page-loading:after{content:"";position:fixed;top:50%;left:50%;z-index:2147483647;width:38px;height:38px;margin:-19px 0 0 -19px;border:3px solid rgba(255,255,255,.22);border-top-color:#fff;border-radius:50%;animation:pageLoaderSpin .65s linear infinite}@keyframes pageLoaderSpin{to{transform:rotate(360deg)}} </style>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>TitanXGaming - Forgot Password</title>
  <link rel="stylesheet" href="assets/css/style.css?v=1.0.40" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="forgot-page">
  <header class="top-header">
    <div class="logo-box"><img class="site-logo" src="assets/custom/images/logo.png"/ decoding="async" loading="eager" fetchpriority="high"></div>
    <button class="lang-btn" id="langBtn" type="button" aria-label="Change language">G文</button>
  </header>

  <main class="forgot-main">
    <section class="forgot-card" aria-label="Reset password panel">
      <h1>RESET PASSWORD</h1>
      <div class="forgot-title-line"></div>

      <form class="forgot-form">
        <label class="forgot-field">
          <span><i class="fa-solid fa-phone"></i></span>
          <input type="tel" placeholder="e.g. 61480050689" autocomplete="tel" />
        </label>

        <button class="forgot-submit" type="button">RESET PASSWORD</button>

        <a class="forgot-login-link" href="login.html">Login Here <i class="fa-solid fa-chevron-right"></i></a>
      </form>
    </section>
  </main>

  <nav class="bottom-nav">
    <a href="index.html"><img src="assets/custom/images/home.png" alt="HOME" decoding="async" loading="lazy"></a>
    <a href="index.html"><img src="assets/custom/images/history.png" alt="HISTORY" decoding="async" loading="lazy"></a>
    <a href="bonus.html"><img src="assets/custom/images/bonus.png" alt="BONUS" decoding="async" loading="lazy"></a>
    <a href="chat.html"><img src="assets/custom/images/livechat.png" alt="LIVE CHAT" decoding="async" loading="lazy"></a>
    <a href="setting.html"><img src="assets/custom/images/setting.png" alt="SETTING" decoding="async" loading="lazy"></a>
  </nav>

  <div class="lang-overlay" id="langOverlay" aria-hidden="true">
    <div class="lang-modal" role="dialog" aria-modal="true" aria-label="Language selection">
      <button class="lang-option active" type="button" data-lang="en">English <span>✔</span></button>
      <button class="lang-option" type="button" data-lang="zh">中文</button>
    </div>
  </div>

  <script src="assets/js/setting.js"></script>
  <script src="assets/js/config.js?v=1.0.14"></script>
  <script src="assets/js/custom-asset-cache.js?v=1.0.13"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
  <script src="assets/js/firebase-config.js?v=1.0.0"></script>
  <script src="assets/js/livechat-widget.js?v=1.0.1"></script>
  <script src="assets/js/page-loader.js?v=1.0.3"></script>
  <script src="assets/js/site-shell.js?v=1.0.5"></script>
</body>
</html>
