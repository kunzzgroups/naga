<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="game_detail_page_title">D2AUD - Game Detail</title>
  <link rel="stylesheet" href="assets/css/style.css?v=1.0.0" />
  <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
</head>
<body class="game-detail-page">
  <header class="top-header">
    <div class="logo-box"><div class="logo-icon">D</div><div>D2AUD</div></div>
    <i class="fa-solid fa-earth-americas lang-btn" id="langBtn"></i>
  </header>

  <main class="game-detail-main">
    <section class="game-type-tabs" role="tablist" aria-label="Game type tabs" data-i18n-aria-label="game_type_tabs">
      <button class="game-type-tab active" type="button" data-type="slot" data-i18n="game_type_slot">SLOT</button>
      <button class="game-type-tab" type="button" data-type="vpslot" data-i18n="game_type_vpslot">VPSLOT</button>
      <button class="game-type-tab" type="button" data-type="fish" data-i18n="game_type_fish">FISH</button>
      <button class="game-type-tab" type="button" data-type="arcade" data-i18n="game_type_arcade">ARCADE</button>
      <button class="game-type-tab" type="button" data-type="table" data-i18n="game_type_table">TABLE</button>
    </section>

    <section class="detail-game-grid" id="detailGameGrid" aria-live="polite"></section>
  </main>

  <nav class="bottom-nav">
    <a href="index.html"><img src="assets/images/bottom1.png" alt="HOME" data-i18n-img="img.bottom_home" data-i18n-alt="home"></a>
    <a href="history.html"><img src="assets/images/bottom2.png" alt="HISTORY" data-i18n-img="img.bottom_history" data-i18n-alt="history"></a>
    <a href="bonus.html"><img src="assets/images/bottom3.png" alt="BONUS" data-i18n-img="img.bottom_bonus" data-i18n-alt="bonus"></a>
    <a href="chat.html"><img src="assets/images/bottom4.png" alt="LIVE CHAT" data-i18n-img="img.bottom_chat" data-i18n-alt="live_chat"></a>
    <a href="setting.html"><img src="assets/images/bottom5.png" alt="SETTING" data-i18n-img="img.bottom_setting" data-i18n-alt="setting"></a>
  </nav>

  <div class="lang-overlay" id="langOverlay" aria-hidden="true">
    <div class="lang-modal" role="dialog" aria-modal="true" aria-label="Language selection" data-i18n-aria-label="language_selection">
      <button class="lang-option active" type="button" data-lang="en" data-i18n="lang_english">English <span>✔</span></button>
      <button class="lang-option" type="button" data-lang="zh" data-i18n="lang_chinese">中文</button>
    </div>
  </div>

  <script src="assets/js/lang.js?v=1.0.0"></script>
  <script src="assets/js/game-detail.js?v=1.0.0"></script>
</body>
</html>
