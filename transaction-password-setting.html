<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="transaction_password_page_title">D2AUD - Transaction Password</title>
  <link rel="stylesheet" href="assets/css/style.css?v=1.0.23" />
  <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
</head>
<body class="setting-page setting-form-page">
  <header class="top-header">
    <div class="logo-box"><img class="site-logo" src="assets/custom/images/logo.png"/></div>
    <i class="fa-solid fa-earth-americas lang-btn" id="langBtn" data-i18n-title="change_language" data-i18n-aria-label="change_language"></i>
  </header>

  <main class="setting-form-main">
    <section class="setting-form-card game-glass-card">
      <div class="setting-form-head">
        <a href="setting.html" class="back-link"><i class="fa-solid fa-chevron-left" style="font-size:20px;"></i></a>
        <div>
          <h1 data-i18n="transaction_password">Transaction Password</h1>
          <p data-i18n="transaction_password_protection_desc">Use 6 - 20 characters to protect withdrawals</p>
        </div>
      </div>

      <form class="theme-form" id="transactionPasswordForm">
        <label class="form-label" data-i18n="new_transaction_password">New Transaction Password</label>
        <div class="theme-input-wrap password-wrap">
          <span class="input-ico">🔐</span>
          <input id="txPass" type="password" placeholder="6 - 20 characters" data-i18n-placeholder="transaction_password_6_20_placeholder" autocomplete="off" />
          <button class="eye-btn" type="button" aria-label="Show password" data-i18n-aria-label="show_password">👁</button>
        </div>

        <label class="form-label" data-i18n="confirm_transaction_password">Confirm Transaction Password</label>
        <div class="theme-input-wrap password-wrap">
          <span class="input-ico">🔐</span>
          <input id="txConfirm" type="password" placeholder="Confirm transaction password" data-i18n-placeholder="confirm_transaction_password_placeholder" autocomplete="off" />
          <button class="eye-btn" type="button" aria-label="Show password" data-i18n-aria-label="show_password">👁</button>
        </div>

        <div class="auth-message" id="txMsg"></div>
        <button class="green-submit-btn" id="txSave" type="submit" data-i18n="save_transaction_password">Save Transaction Password</button>
      </form>
    </section>
  </main>

  <nav class="bottom-nav">
    <a href="index.html"><img src="assets/custom/images/home.png" alt="HOME"></a>
    <a href="history.html"><img src="assets/custom/images/history.png" alt="HISTORY"></a>
    <a href="bonus.html"><img src="assets/custom/images/bonus.png" alt="BONUS"></a>
    <a href="chat.html"><img src="assets/custom/images/livechat.png" alt="LIVE CHAT"></a>
    <a class="active" href="setting.html"><img src="assets/custom/images/setting.png" alt="SETTING"></a>
  </nav>

  <div class="lang-overlay" id="langOverlay" aria-hidden="true">
    <div class="lang-modal" role="dialog" aria-modal="true" aria-label="Language selection" data-i18n-aria-label="language_selection">
      <button class="lang-option active" type="button" data-lang="en" data-i18n="lang_english">English</button>
      <button class="lang-option" type="button" data-lang="zh" data-i18n="lang_chinese">中文</button>
    </div>
  </div>

  <script src="assets/js/lang.js"></script>
  <script src="assets/js/settings-form.js"></script>
  <script src="assets/js/config.js?v=1.0.14"></script>
  <script src="assets/js/transaction-password-setting.js?v=1.0.1"></script>
  <script src="assets/js/custom-asset-cache.js?v=1.0.11"></script>
</body>
</html>
