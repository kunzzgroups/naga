<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D2AUD - Downline</title>
  <link rel="stylesheet" href="assets/css/style.css?v=1.0.17" />
  <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
</head>
<body class="downline-page">
  <header class="top-header">
    <div class="logo-box"><img class="site-logo" src="assets/custom/images/logo.png"/></div>
    <i class="fa-solid fa-earth-americas lang-btn" id="langBtn"></i>
  </header>

  <main class="downline-main">
    <section class="downline-card">
      <div class="downline-head">
        <div>
          <span class="mini-label" data-i18n="downline_referral_network">REFERRAL NETWORK</span>
          <h1 data-i18n="downline_title">Downline</h1>
        </div>
        <div class="downline-code">RF1A850A95</div>
      </div>

      <div class="downline-toolbar">
        <label>
          <span data-i18n="view_level">View Level</span>
          <select id="downlineLevel">
            <option value="1">Level 1</option>
            <option value="2">Level 2</option>
            <option value="3">Level 3</option>
            <option value="4">Level 4</option>
            <option value="5">Level 5</option>
          </select>
        </label>
        <button type="button" class="gold-btn" data-i18n="refresh">Refresh</button>
      </div>

      <div class="downline-summary">
        <div><b id="downlineTotalMembers">0</b><span data-i18n="total_members">Total Members</span></div>
        <div><b id="downlineTotalCommission">AUD 0.00</b><span data-i18n="total_commission">Total Commission</span></div>
        <div><b id="downlineCurrentLevel">Level 1</b><span data-i18n="current_view">Current View</span></div>
      </div>

      <div class="downline-table-wrap">
        <table class="downline-table">
            <thead>
                <tr>
                    <th data-i18n="downline_no">No.</th>
                    <th data-i18n="downline_name">Downline</th>
                    <th data-i18n="downline_commission">Commission</th>
                    <th data-i18n="downline_register_datetime">Register Datetime</th>
                </tr>
            </thead>
            <tbody id="downlineTableBody">
                <tr>
                    <td>1</td>
                    <td>John Doe</td>
                    <td>AUD 10.00</td>
                    <td>2023-10-01 10:30:00</td>
                </tr>
                <tr class="empty-row">
                    <td colspan="4">
                    <div class="empty-state">
                        <div class="empty-icon">👥</div>
                        <h3 data-i18n="no_downline_error">No downline yet</h3>
                        <p data-i18n="share_your_referral_link_desc">Share your referral link to invite friends and start earning commission.</p>
                    </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <a class="active" href="index.html"><img src="assets/custom/images/home.png" alt="HOME"></a>
    <a href="history.html"><img src="assets/custom/images/history.png" alt="HISTORY"></a>
    <a href="bonus.html"><img src="assets/custom/images/bonus.png" alt="BONUS"></a>
    <a href="chat.html"><img src="assets/custom/images/livechat.png" alt="LIVE CHAT"></a>
    <a href="setting.html"><img src="assets/custom/images/setting.png" alt="SETTING"></a>
  </nav>

  <div class="lang-overlay" id="langOverlay" aria-hidden="true">
    <div class="lang-modal" role="dialog" aria-modal="true" aria-label="Language selection">
      <button class="lang-option active" type="button" data-lang="en"><span data-i18n="lang_english">English</span> <span class="checkmark">✔</span></button>
      <button class="lang-option" type="button" data-lang="zh"><span data-i18n="lang_chinese">中文</span></button>
    </div>
  </div>

  <script src="assets/js/lang.js?v=1.0.1"></script>
  <script src="assets/js/downline.js?v=1.0.1"></script>
  <script src="assets/js/config.js?v=1.0.10"></script>
  <script src="assets/js/custom-asset-cache.js?v=1.0.10"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
  <script src="assets/js/firebase-config.js?v=1.0.0"></script>
  <script src="assets/js/livechat-widget.js?v=1.0.0"></script>
</body>
</html>
