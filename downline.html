<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D2AUD - Downline</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="downline-page">
  <header class="top-header">
    <div class="logo-box"><div class="logo-icon">D</div><div>D2AUD</div></div>
    <button class="lang-btn" id="langBtn" type="button" aria-label="Change language">G文</button>
  </header>

  <main class="downline-main">
    <section class="downline-card">
      <div class="downline-head">
        <div>
          <span class="mini-label">REFERRAL NETWORK</span>
          <h1>Downline</h1>
        </div>
        <div class="downline-code">RF1A850A95</div>
      </div>

      <div class="downline-toolbar">
        <label>
          <span>View Level</span>
          <select id="downlineLevel">
            <option value="1">Level 1</option>
            <option value="2">Level 2</option>
            <option value="3">Level 3</option>
            <option value="4">Level 4</option>
            <option value="5">Level 5</option>
          </select>
        </label>
        <button type="button" class="gold-btn">Refresh</button>
      </div>

      
    </section>
  </main>

  <nav class="bottom-nav">
    <a href="index.html"><img src="assets/images/bottom1.png" alt="HOME"></a>
    <a href="history.html"><img src="assets/images/bottom2.png" alt="HISTORY"></a>
    <a href="bonus.html"><img src="assets/images/bottom3.png" alt="BONUS"></a>
    <a href="chat.html"><img src="assets/images/bottom4.png" alt="LIVE CHAT"></a>
    <a href="setting.html"><img src="assets/images/bottom5.png" alt="SETTING"></a>
  </nav>

  <div class="lang-overlay" id="langOverlay" aria-hidden="true">
    <div class="lang-modal" role="dialog" aria-modal="true" aria-label="Language selection">
      <button class="lang-option active" type="button" data-lang="en">English <span>✔</span></button>
      <button class="lang-option" type="button" data-lang="zh">中文</button>
    </div>
  </div>

  <script src="assets/js/downline.js"></script>
</body>
</html>
