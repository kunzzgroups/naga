<body class="downline-page">
  <header class="top-header">
    <div data-layout-section="home-header"></div>
    <div class="logo-box"><img class="site-logo" src="assets/custom/images/logo.png"/ decoding="async" loading="eager" fetchpriority="high"></div>
  </header>

  <main class="downline-main">
    <section class="downline-card">
      <div class="downline-head">
        <div>
          <span class="mini-label" data-i18n="downline_referral_network">REFERRAL NETWORK</span>
          <h1 data-i18n="downline_title">Downline</h1>
        </div>
        <div class="downline-code">-</div>
      </div>

      <div class="downline-toolbar">
        <label>
          <span data-i18n="view_level">View Level</span>
          <select id="downlineLevel">
                        <option value="1">Level 1</option>
            <option value="2">Level 2</option>
            <option value="3">Level 3</option>
            <option value="4">Level 4</option>
            <option value="5">Level 5</option>
            <option value="6">Level 6</option>
            <option value="7">Level 7</option>
            <option value="8">Level 8</option>
            <option value="9">Level 9</option>
            <option value="10">Level 10</option>
          </select>
        </label>
        <button type="button" class="gold-btn" data-i18n="refresh">Refresh</button>
      </div>

      <div class="downline-summary">
        <div><b id="downlineTotalMembers">0</b><span data-i18n="total_members">Total Members</span></div>
        <div><b id="downlineTotalCommission">MYR 0.00</b><span data-i18n="total_commission">Total Commission</span></div>
        <div><b id="downlineCurrentLevel">Level 1</b><span data-i18n="current_view">Current View</span></div>
      </div>

      <div class="downline-table-wrap">
        <table class="downline-table">
            <thead>
                <tr>
                    <th data-i18n="downline_no">No.</th>
                    <th data-i18n="downline_name">Downline</th>
                    <th data-i18n="downline_commission">Commission</th>
                    <th data-i18n="downline_register_datetime">Register Datetime</th>
                </tr>
            </thead>
            <tbody id="downlineTableBody">
                <tr>
                    <td>1</td>
                    <td>John Doe</td>
                    <td>MYR 10.00</td>
                    <td>2023-10-01 10:30:00</td>
                </tr>
                <tr class="empty-row">
                    <td colspan="4">
                    <div class="empty-state">
                        <div class="empty-icon">👥</div>
                        <h3 data-i18n="no_downline_error">No downline yet</h3>
                        <p data-i18n="share_your_referral_link_desc">Share your referral link to invite friends and start earning commission.</p>
                    </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    </section>
  </main>
