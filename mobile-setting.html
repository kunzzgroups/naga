<!DOCTYPE html>
<html lang="en">
<head>
  <script>document.documentElement.classList.add('page-loading');</script>
  <style id="page-loader-critical">html.page-loading,html.page-loading body{overflow:hidden!important}html.page-loading:before{content:"";position:fixed;inset:0;z-index:2147483646;background:#050505}html.page-loading:after{content:"";position:fixed;top:50%;left:50%;z-index:2147483647;width:38px;height:38px;margin:-19px 0 0 -19px;border:3px solid rgba(255,255,255,.22);border-top-color:#fff;border-radius:50%;animation:pageLoaderSpin .65s linear infinite}@keyframes pageLoaderSpin{to{transform:rotate(360deg)}} </style>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="mobile_setting_page_title">TitanXGaming - Change Mobile Number</title>
  <link rel="stylesheet" href="assets/css/style.css?v=1.0.37" />
  <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
</head>
<body class="setting-page setting-form-page">
  <header class="top-header">
    <div class="logo-box"><img class="site-logo" src="assets/custom/images/logo.png"/ decoding="async" loading="eager" fetchpriority="high"></div>
    <i class="fa-solid fa-earth-americas lang-btn" id="langBtn" data-i18n-title="change_language" data-i18n-aria-label="change_language"></i>
  </header>

  <main class="setting-form-main">
    <section class="setting-form-card game-glass-card">
      <div class="setting-form-head">
        <a href="setting.html" class="back-link"><i class="fa-solid fa-chevron-left" style="font-size: 20px;"></i></a>
        <div>
          <h1 data-i18n="change_mobile_number">Change Mobile Number</h1>
          <p data-i18n="update_contact_securely">Update your contact number securely</p>
        </div>
      </div>

      <form class="theme-form">
        <label class="form-label" data-i18n="new_mobile_number">New Mobile Number</label>
        <div class="theme-input-wrap">
          <span class="input-ico"><i class="fa-solid fa-mobile"></i></span>
          <input type="tel" placeholder="e.g. 61480050689" data-i18n-placeholder="mobile_number_placeholder" />
        </div>

        <div class="verification-panel">
          <p data-i18n-html="mobile_verification_instruction">Press <strong>GET CODE</strong> button to receive verification code via SMS.</p>
          <div class="verify-row">
            <input type="text" placeholder="Verification Code" data-i18n-placeholder="verification_code" />
            <button type="button" data-i18n="get_code">GET CODE</button>
          </div>
        </div>

        <button class="gold-ring-btn" type="submit" data-i18n="submit">SUBMIT</button>
      </form>
    </section>
  </main>
  <nav class="bottom-nav">
    <a href="index.html"><img src="assets/custom/images/home.png" alt="HOME" decoding="async" loading="lazy"></a>
    <a href="index.html"><img src="assets/custom/images/history.png" alt="HISTORY" decoding="async" loading="lazy"></a>
    <a href="bonus.html"><img src="assets/custom/images/bonus.png" alt="BONUS" decoding="async" loading="lazy"></a>
    <a href="chat.html"><img src="assets/custom/images/livechat.png" alt="LIVE CHAT" decoding="async" loading="lazy"></a>
    <a class="active" href="setting.html"><img src="assets/custom/images/setting.png" alt="SETTING" decoding="async" loading="lazy"></a>
  </nav>

  <div class="lang-overlay" id="langOverlay" aria-hidden="true">
    <div class="lang-modal" role="dialog" aria-modal="true" aria-label="Language selection" data-i18n-aria-label="language_selection">
      <button class="lang-option active" type="button" data-lang="en">English</button>
      <button class="lang-option" type="button" data-lang="zh">中文</button>
    </div>
  </div>

  <script src="assets/js/site-shell.js?v=1.0.4"></script>
  <script src="assets/js/lang.js"></script>
  <script src="assets/js/setting.js"></script>
  <script src="assets/js/config.js?v=1.0.14"></script>
  <script src="assets/js/custom-asset-cache.js?v=1.0.12"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
  <script src="assets/js/firebase-config.js?v=1.0.0"></script>
  <script src="assets/js/livechat-widget.js?v=1.0.1"></script>
  <script src="assets/js/page-loader.js?v=1.0.3"></script>
</body>
</html>
